<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirth & Maker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="Mirth & Maker logo.png" type="image/loom-icon">
</head>

<body>
    <main>
        <section class="container-lg mt-5">
            <div class="row">
                <div class="col-md-6">
                    <img src="duck-party.png" alt="" class="w-100">
                </div>
                <div
                    class="col-md-6 border border-2 border-danger-subtle d-flex flex-column justify-content-center align-items-center p-3 rounded rounded-5 shadow">
                    <div class="row w-75 d-flex flex-cloumn justify-content-center align-items-center">
                        <a href="index.html" title="Go to home page" class="text-center"><img
                                src="Mirth & Maker logo.png" width="100px" alt=""></a>
                        <div class="h4 pb-2 mb-4 text-danger border-bottom border-danger text-center">
                            New user? Sign Up
                        </div>
                    </div>
                    <div class="row w-75 d-flex flex-cloumn justify-content-center align-items-center">
                        <div class="row d-flex flex-cloumn justify-content-center align-items-center">
                            <div class="row g-3">
                                <div class="col">
                                    <input type="text" class="form-control" placeholder="First name"
                                        aria-label="First name">
                                </div>
                                <div class="col">
                                    <input type="text" class="form-control" placeholder="Last name"
                                        aria-label="Last name">
                                </div>
                            </div>
                            <div class="mb-2">
                                <label for="exampleFormControlInput1" class="form-label"></label>
                                <input type="email" class="form-control" id="exampleFormControlInput1"
                                    placeholder="Enter email">
                            </div>
                            <div class="mb-2">
                                <label for="exampleFormControlInput1" class="form-label"></label>
                                <input type="text" class="form-control" id="exampleFormControlInput1"
                                    placeholder="Enter mobile number">
                            </div>

                        </div>
                        <div class="row mb-3">
                            <div class="form-check ">
                                <input class="form-check-input" type="checkbox" value="" id="checkDefault">
                                <label class="form-check-label" for="checkDefault">
                                    Accept all trems & conditions. <a href="#" class="text-decoration-none">T&C</a>
                                </label>
                            </div>
                        </div>
                        <div class="row d-flex justify-content-center">
                            <a href="index.html" class="w-75 text-center">
                                <button type="button" class="btn btn-danger w-100">Create account</button>
                            </a>
                        </div>
                        <p class="text-center mt-2">Already have an account! <a href="login.html"
                                class="text-decoration-none">Login here</a></p>
                        <div class="row my-4">
                            <div class="col-md-4 text-end">
                                <a href="#" title="google">
                                <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/c/c1/Google_%22G%22_logo.svg/250px-Google_%22G%22_logo.svg.png"
                                    class="w-50" alt="">
                                    </a>
                            </div>
                            <div class="col-md-4 text-center">
                                <a href="#" title="facebook">
                                <img src="https://img.freepik.com/premium-photo/facebook-logo_1080029-107.jpg?semt=ais_rp_50_assets&w=740&q=80"
                                    class="w-50" alt="">
                                    </a>
                            </div>
                            <div class="col-md-4 text-start">
                                <a href="#" title="x">
                                <img src="https://images.seeklogo.com/logo-png/49/2/twitter-x-logo-png_seeklogo-492396.png"
                                    class="w-50" alt="">
                                    </a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
